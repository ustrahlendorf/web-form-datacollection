version: "3"

# Run all tasks in silent mode by default (do not echo commands).
silent: true

# Load non-secret Taskfile inputs from a repo-local env file.
# This keeps stack wiring inputs (e.g. table names, SSM namespace) out of code and out of shell history.
dotenv: ["taskfile.env"]

# Repo entrypoint for common dev/ops actions.
# Note: This Taskfile lives at the git repo root (`web-form-verbrauch/`).
#
# Usage examples:
#   task doctor
#   task python:check-heating-deps
#   task deploy-init
#   ACTIVE_SUBMISSIONS_TABLE_NAME=submissions-2025 PASSIVE_SUBMISSIONS_TABLE_NAME=submissions-2026 task cdk:synth
#   task deploy-dynamodb
#
# Notes:
# - This project expects ACTIVE_/PASSIVE_ table names to be set explicitly for CDK synth/deploy.
# - Python/Node environments (e.g. venv, npm install) are assumed to be prepared by the user.
# - Tasks that run Python or CDK expect an activated venv (`source .venv/bin/activate`); see `_python:require-venv`.

vars:
  # Task working directory root (this repo).
  APP_DIR: .
  # This repository currently supports DEV only.
  # We intentionally do not support prod/staging environments via Taskfile to reduce risk.
  ENV_NAME: dev
  AWS_REGION: '{{default "eu-central-1" .AWS_REGION}}'
  # Keep jsii/CDK runtime caches inside the repo so tasks work in sandboxed environments.
  JSII_CACHE_DIR: ".jsii-package-cache"

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task -l

  _python:require-venv:
    internal: true
    cmds:
      - |
        if [ -z "${VIRTUAL_ENV:-}" ]; then
          echo "ERROR: Python virtual environment is not active." >&2
          echo "  From the repo root: source .venv/bin/activate" >&2
          echo "  (Windows: .venv\\Scripts\\activate)" >&2
          exit 1
        fi

  doctor-base:
    desc: "Preflight checks (tooling only)"
    cmds:
      - command -v python3 >/dev/null
      - command -v node >/dev/null
      - command -v cdk >/dev/null

  doctor-aws:
    desc: "Preflight checks (AWS CLI installed)"
    cmds:
      - command -v aws >/dev/null

  doctor-dynamodb-names:
    desc: "Preflight checks (required DynamoDB naming env vars)"
    cmds:
      - test -n "$ACTIVE_SUBMISSIONS_TABLE_NAME"
      - test -n "$PASSIVE_SUBMISSIONS_TABLE_NAME"
      - test "$ACTIVE_SUBMISSIONS_TABLE_NAME" != "$PASSIVE_SUBMISSIONS_TABLE_NAME"

  doctor-init:
    desc: "Preflight checks for InitStack (requires SSM namespace env var)"
    deps: [doctor-base, _python:require-venv]
    cmds:
      - test -n "$SSM_NAMESPACE_PREFIX"

  doctor:
    desc: "Preflight checks (tooling + required env vars + heating deps alignment)"
    deps: [doctor-base, doctor-dynamodb-names, python:check-heating-deps]

  python:check-heating-deps:
    desc: "Verify requirements-heating.txt aligns with backend/pyproject.toml (Viessmann Lambda)"
    deps: [_python:require-venv]
    dir: "{{.APP_DIR}}"
    cmds:
      - python3 scripts/check_heating_requirements.py

  test:
    desc: "Run backend + frontend tests"
    deps: [test-backend, test-frontend]

  test-backend:
    desc: "Run pytest"
    deps: [_python:require-venv]
    dir: "{{.APP_DIR}}"
    cmds:
      - python3 -m pytest -q

  test-frontend:
    desc: "Run frontend tests"
    dir: "{{.APP_DIR}}/frontend"
    cmds:
      - npm test

  export-datalake:
    desc: "Export DynamoDB snapshot(s) to S3 DataLake (preferred task export-datalake -- TARGET YEAR MONTH; or EXPORT_* vars; env DATALAKE_BUCKET_NAME)"
    deps: [_python:require-venv]
    dir: "{{.APP_DIR}}"
    cmds:
      - |
        if [ -z "${DATALAKE_BUCKET_NAME:-}" ]; then
          echo "ERROR: Set DATALAKE_BUCKET_NAME (CDK output DataLakeBucketName or add to taskfile.env)." >&2
          exit 1
        fi

        # Positional args after -- (go-task CLI_ARGS): TARGET YEAR MONTH
        if [ -n '{{.CLI_ARGS}}' ]; then
          set -- {{.CLI_ARGS}}
          if [ "$#" -ne 3 ]; then
            echo "ERROR: After -- pass exactly 3 arguments: TARGET YEAR MONTH" >&2
            echo "  Example: task export-datalake -- submissions 2025 2" >&2
            echo "  TARGET is one of: submissions | passive | frequent | all" >&2
            exit 1
          fi
          TARGET="$1"
          EXPORT_YEAR="$2"
          EXPORT_MONTH="$3"
        else
          TARGET="{{.EXPORT_TARGET}}"
          EXPORT_YEAR="{{.EXPORT_YEAR}}"
          EXPORT_MONTH="{{.EXPORT_MONTH}}"
        fi

        if [ -z "$EXPORT_YEAR" ] || [ -z "$EXPORT_MONTH" ]; then
          echo "ERROR: Pass year and month via named vars or positionally after --." >&2
          echo "  Named:  task export-datalake EXPORT_TARGET=submissions EXPORT_YEAR=2025 EXPORT_MONTH=3" >&2
          echo "  Args:   task export-datalake -- submissions 2025 3" >&2
          exit 1
        fi
        if [ -z "$TARGET" ]; then
          echo "ERROR: Pass EXPORT_TARGET (named) or TARGET as first arg after -- (submissions|passive|frequent|all)." >&2
          exit 1
        fi

        run_submissions() {
          python3 scripts/export_dynamodb_to_s3.py \
            --preset submissions \
            --bucket "$DATALAKE_BUCKET_NAME" \
            --region "{{.AWS_REGION}}" \
            --year "$EXPORT_YEAR" \
            --month "$EXPORT_MONTH"
        }

        run_passive() {
          if [ -z "${PASSIVE_SUBMISSIONS_TABLE_NAME:-}" ]; then
            echo "ERROR: PASSIVE_SUBMISSIONS_TABLE_NAME is not set (add to taskfile.env for CDK; required for EXPORT_TARGET=passive or all)." >&2
            exit 1
          fi
          python3 scripts/export_dynamodb_to_s3.py \
            --table "$PASSIVE_SUBMISSIONS_TABLE_NAME" \
            --prefix-base exports/submissions-passive \
            --bucket "$DATALAKE_BUCKET_NAME" \
            --region "{{.AWS_REGION}}" \
            --year "$EXPORT_YEAR" \
            --month "$EXPORT_MONTH"
        }

        run_frequent() {
          export AUTO_RETRIEVAL_FREQUENT_TABLE_NAME="${AUTO_RETRIEVAL_FREQUENT_TABLE_NAME:-submissions-auto-retrieval-frequent-{{.ENV_NAME}}}"
          python3 scripts/export_dynamodb_to_s3.py \
            --preset auto_retrieval_frequent \
            --bucket "$DATALAKE_BUCKET_NAME" \
            --region "{{.AWS_REGION}}" \
            --year "$EXPORT_YEAR" \
            --month "$EXPORT_MONTH"
        }

        case "$TARGET" in
          submissions)
            run_submissions
            ;;
          passive)
            run_passive
            ;;
          frequent)
            run_frequent
            ;;
          all)
            run_submissions || exit $?
            echo "--- passive submissions ---"
            run_passive || exit $?
            echo "--- frequent auto-retrieval ---"
            run_frequent || exit $?
            ;;
          *)
            echo "ERROR: EXPORT_TARGET must be submissions, passive, frequent, or all (got: $TARGET)" >&2
            exit 1
            ;;
        esac

  cdk:synth:
    desc: "CDK synth (requires ACTIVE_/PASSIVE_ table env vars)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk synth

  cdk:diff:
    desc: "CDK diff (requires ACTIVE_/PASSIVE_ table env vars)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk diff

  deploy-init:
    desc: "Deploy Init stack (dev) - static SSM parameters under /HeatingDataCollection/"
    deps: [doctor-init]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - |
        # The current CDK app requires DynamoDB table names to be set at import/synth time.
        # InitStack itself does not depend on these values, so we provide safe placeholders
        # when running this Init-only deploy task.
        export ACTIVE_SUBMISSIONS_TABLE_NAME="${ACTIVE_SUBMISSIONS_TABLE_NAME:-__unused_active__}"
        export PASSIVE_SUBMISSIONS_TABLE_NAME="${PASSIVE_SUBMISSIONS_TABLE_NAME:-__unused_passive__}"

        # Guardrail: this task expects InitStack to be wired into the CDK app.
        # If it isn't, CDK will error with a less obvious message.
        if ! cdk list | grep -q '^DataCollectionInit-dev$'; then
          echo "ERROR: CDK app does not expose stack 'DataCollectionInit-dev' yet." >&2
          echo "Hint: wire InitStack in web-form-verbrauch/infrastructure/app.py (task: wire-init)." >&2
          exit 2
        fi
        cdk deploy --exclusively "DataCollectionInit-dev"

  deploy-dynamodb:
    desc: "Deploy DynamoDB stack (dev)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk deploy "DataCollectionDynamoDB-dev"

  deploy-api:
    desc: "Deploy API stack (dev)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      # Important: deploy API without pulling in dependency stacks.
      # This is required for year roll-over recovery where DynamoDB exports are blocked
      # until the API stack is updated to stop importing passive exports.
      - cdk deploy --exclusively "DataCollectionAPI-dev"

  deploy-api-with-deps:
    desc: "Deploy API stack (dev) including dependency stacks (CDK default behavior)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk deploy "DataCollectionAPI-dev"

  deploy-frontend:
    desc: "Deploy Frontend stack (dev)"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk deploy "DataCollectionFrontend-dev"

  deploy-scheduler-daily:
    desc: "Deploy Scheduler stack (dev) - auto-retrieval of Viessmann data"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk deploy "DataCollectionScheduler-dev"

  deploy-scheduler-frequent:
    desc: "Deploy Scheduler frequent stack (dev) - production auto-retrieval with multiple runs per day"
    deps: [doctor]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk deploy "DataCollectionSchedulerFrequent-dev"

  deploy:deps:
    desc: "Show deploy task -> CDK stack dependency matrix (static transparency view)"
    cmds:
      - |
        cat <<'EOF'
        Deploy command dependency matrix (dev)
        ======================================

        deploy-init
          - CDK command: cdk deploy --exclusively DataCollectionInit-dev
          - Effective stacks: DataCollectionInit-dev
          - Notes: exclusive deploy (dependency stacks are intentionally not pulled in)

        deploy-dynamodb
          - CDK command: cdk deploy DataCollectionDynamoDB-dev
          - Effective stacks: DataCollectionInit-dev, DataCollectionDynamoDB-dev
          - Notes: default CDK behavior includes dependencies

        deploy-api
          - CDK command: cdk deploy --exclusively DataCollectionAPI-dev
          - Effective stacks: DataCollectionAPI-dev
          - Notes: exclusive deploy for rollover/recovery workflows

        deploy-api-with-deps
          - CDK command: cdk deploy DataCollectionAPI-dev
          - Effective stacks:
            DataCollectionInit-dev
            DataCollectionFrontend-dev
            DataCollectionCognito-dev
            DataCollectionDynamoDB-dev
            DataCollectionDataLake-dev
            DataCollectionAppConfig-dev
            DataCollectionAPI-dev
          - Notes: default CDK behavior includes dependencies

        deploy-frontend
          - CDK command: cdk deploy DataCollectionFrontend-dev
          - Effective stacks: DataCollectionFrontend-dev
          - Notes: no explicit stack dependencies in current CDK app wiring

        deploy-scheduler-daily
          - CDK command: cdk deploy DataCollectionScheduler-dev
          - Effective stacks:
            DataCollectionInit-dev
            DataCollectionDynamoDB-dev
            DataCollectionAppConfig-dev
            DataCollectionScheduler-dev
          - Notes: scheduler stacks exist only when VIESSMANN_CREDENTIALS_SECRET_ARN is set

        deploy-scheduler-frequent
          - CDK command: cdk deploy DataCollectionSchedulerFrequent-dev
          - Effective stacks:
            DataCollectionInit-dev
            DataCollectionAppConfig-dev
            DataCollectionSchedulerFrequent-dev
          - Notes: scheduler stacks exist only when VIESSMANN_CREDENTIALS_SECRET_ARN is set
        EOF

  invoke-auto-retrieval-frequent:
    desc: "Invoke frequent auto-retrieval Lambda (writes to frequent table only)"
    deps: [doctor-aws]
    dir: "{{.APP_DIR}}"
    env:
      AWS_REGION: "{{.AWS_REGION}}"
    cmds:
      - |
        set -e
        FN=$(aws cloudformation describe-stacks \
          --stack-name DataCollectionSchedulerFrequent-dev \
          --query "Stacks[0].Outputs[?OutputKey=='FrequentLambdaFunctionName'].OutputValue" \
          --output text 2>/dev/null) || true
        if [ -z "$FN" ] || [ "$FN" = "None" ]; then
          echo "ERROR: DataCollectionSchedulerFrequent-dev stack not deployed or missing output." >&2
          echo "Run: task deploy-scheduler-frequent" >&2
          exit 2
        fi
        aws lambda invoke --function-name "$FN" --payload '{}' /tmp/auto-retrieval-frequent-output.json
        cat /tmp/auto-retrieval-frequent-output.json
        echo ""

  destroy-scheduler-frequent:
    desc: "Destroy Scheduler frequent stack (removes frequent table and Lambda)"
    deps: [doctor-aws, _python:require-venv]
    dir: "{{.APP_DIR}}"
    env:
      CDK_DEFAULT_REGION: "{{.AWS_REGION}}"
      JSII_RUNTIME_PACKAGE_CACHE_ROOT: "{{.JSII_CACHE_DIR}}"
    cmds:
      - cdk destroy "DataCollectionSchedulerFrequent-dev" --force

  ssm:init:show:
    desc: "Show InitStack SSM parameters (expects InitStack deployed)"
    deps: [doctor-aws, doctor-init]
    cmds:
      - |
        set -e
        pfx="${SSM_NAMESPACE_PREFIX}"

        get_param () {
          name="$1"
          aws --region "${AWS_REGION}" ssm get-parameter --name "${name}" --output json
        }

        get_param "${pfx}/Config/SchemaVersion"
        get_param "${pfx}/FeatureFlags/EnablePassiveReads"
        get_param "${pfx}/Operations/Rollover/RunbookVersion"
        get_param "${pfx}/AutoRetrieval/ScheduleCron"
        get_param "${pfx}/AutoRetrieval/ScheduleTimezone"
        get_param "${pfx}/AutoRetrieval/FrequentScheduleCron"
        get_param "${pfx}/AutoRetrieval/FrequentActiveWindows"
        get_param "${pfx}/AutoRetrieval/MaxRetries"
        get_param "${pfx}/AutoRetrieval/RetryDelaySeconds"
        get_param "${pfx}/AutoRetrieval/UserId"

  ssm:init:show-compact:
    desc: "Show InitStack SSM parameters (name=value, compressed)"
    deps: [doctor-aws, doctor-init]
    cmds:
      - |
        set -e
        aws --region "${AWS_REGION}" ssm get-parameters-by-path \
          --path "${SSM_NAMESPACE_PREFIX}" --recursive --with-decryption \
          --query "Parameters[*].[Name,Value]" --output text \
        | while IFS=$'\t' read -r name value; do echo "${name}"; echo "--> ${value}"; done

  env:print:
    desc: "Print shell exports for ACTIVE_/PASSIVE_ table names (use with eval)"
    deps: [_python:require-venv]
    vars:
      # Prefer explicit task args; fall back to current shell env vars if present.
      ACTIVE: '{{default .ACTIVE_SUBMISSIONS_TABLE_NAME .ACTIVE}}'
      PASSIVE: '{{default .PASSIVE_SUBMISSIONS_TABLE_NAME .PASSIVE}}'
    cmds:
      - test -n "{{.ACTIVE}}"
      - test -n "{{.PASSIVE}}"
      - test "{{.ACTIVE}}" != "{{.PASSIVE}}"
      - |
        python3 -c '
        import shlex
        active = "{{.ACTIVE}}"
        passive = "{{.PASSIVE}}"
        print("export ACTIVE_SUBMISSIONS_TABLE_NAME=" + shlex.quote(active))
        print("export PASSIVE_SUBMISSIONS_TABLE_NAME=" + shlex.quote(passive))
        '

  env:show:
    desc: "Show current shell values for *_SUBMISSIONS_TABLE_NAME (with basic warnings)"
    cmds:
      - |
        # Mirrors: env | grep _SUBMISSIONS_TABLE_NAME
        env | grep -E '^(ACTIVE|PASSIVE)_SUBMISSIONS_TABLE_NAME=' || true

        # Basic warnings (non-fatal)
        if [ -z "${ACTIVE_SUBMISSIONS_TABLE_NAME:-}" ]; then
          echo "WARN: ACTIVE_SUBMISSIONS_TABLE_NAME is not set" >&2
        fi
        if [ -z "${PASSIVE_SUBMISSIONS_TABLE_NAME:-}" ]; then
          echo "WARN: PASSIVE_SUBMISSIONS_TABLE_NAME is not set" >&2
        fi
        if [ -n "${ACTIVE_SUBMISSIONS_TABLE_NAME:-}" ] && [ -n "${PASSIVE_SUBMISSIONS_TABLE_NAME:-}" ] && \
           [ "${ACTIVE_SUBMISSIONS_TABLE_NAME}" = "${PASSIVE_SUBMISSIONS_TABLE_NAME}" ]; then
          echo "WARN: ACTIVE_SUBMISSIONS_TABLE_NAME == PASSIVE_SUBMISSIONS_TABLE_NAME (${ACTIVE_SUBMISSIONS_TABLE_NAME})" >&2
        fi


